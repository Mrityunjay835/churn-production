version: "3.9"

services:

  # ── Service 1: MLflow Tracking Server ──────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: mlflow-server
    working_dir: /app
    volumes:
      - ./mlruns:/app/mlruns
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow==2.14.3 setuptools==69.5.1 -q &&
               mlflow ui
               --backend-store-uri /app/mlruns
               --host 0.0.0.0
               --port 5000
               --gunicorn-opts '--bind 0.0.0.0:5000'"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Service 2: Churn Prediction API ────────────────────────────────────────
  api:
    image: churn-api:latest
    container_name: churn-api
    ports:
      - "8000:8000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./artifacts:/app/artifacts
    environment:
      - MLFLOW_TRACKING_URI=mlruns/
      - MLFLOW_MODEL_NAME=churn-xgboost
      - ARTIFACTS_PATH=artifacts/
      - LOG_LEVEL=INFO
    depends_on:
      - mlflow                    # ← removed condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped