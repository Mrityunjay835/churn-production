name: CI Pipeline

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]    # run on every push to main or develop
  pull_request:
    branches: [main]             # run on every PR targeting main

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Run Tests ─────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest       # GitHub provides this machine for free

    steps:
      # Step 1: Get your code onto the CI machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"           # cache pip downloads = faster builds

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install setuptools==69.5.1
          pip install -r requirements.txt

      # Step 4: Run code quality check
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ --ignore E501

      # Step 5: Run tests
      - name: Run tests
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --tb=short
        env:
          RAW_DATA_PATH: data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv
          LOG_LEVEL: WARNING
          MLFLOW_TRACKING_URI: mlruns/
          MLFLOW_MODEL_NAME: churn-xgboost
          ARTIFACTS_PATH: artifacts/

  # ── Job 2: Build Docker Image ─────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test                  # only runs if test job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t churn-api:latest .
          echo "Docker build successful ✓"

      - name: Verify image exists
        run: docker images churn-api