name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install setuptools==69.5.1
          pip install -r requirements.txt

      - name: Download dataset
        run: |
          mkdir -p data/raw
          wget -q -O data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv \
            "https://raw.githubusercontent.com/IBM/telco-customer-churn-on-icp4d/master/data/Telco-Customer-Churn.csv"
          echo "Dataset downloaded: $(wc -l < data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv) lines"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ --ignore E501

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        env:
          RAW_DATA_PATH: data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv
          LOG_LEVEL: WARNING
          MLFLOW_TRACKING_URI: mlruns/
          MLFLOW_MODEL_NAME: churn-xgboost
          ARTIFACTS_PATH: artifacts/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t churn-api:latest .
          echo "Docker build successful ✓"

      - name: Verify image exists
        run: docker images churn-api