data:
  raw_path: data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv
  processed_path: data/processed/
  target_col: Churn
  id_col: customerID
  test_size: 0.2
  random_state: 42

features:
  numeric_cols:
    - tenure
    - MonthlyCharges
    - TotalCharges
  categorical_cols:
    - gender
    - Partner
    - Dependents
    - PhoneService
    - MultipleLines
    - InternetService
    - OnlineSecurity
    - OnlineBackup
    - DeviceProtection
    - TechSupport
    - StreamingTV
    - StreamingMovies
    - Contract
    - PaperlessBilling
    - PaymentMethod

model:
  n_estimators: 300
  max_depth: 6          # was 6 — reducing overfitting on small data
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  eval_metric: logloss
  min_child_weight: 5   # add this — prevents splits on tiny groups
  gamma: 0.1            # add this — minimum loss reduction to split
  reg_alpha: 0.1        # add this — L1 regularization
  reg_lambda: 1.0       # add this — L2 regularization

mlflow:
  experiment_name: churn-prediction
  model_name: churn-xgboost